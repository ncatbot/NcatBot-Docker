services:
  ncatbot:
    image: huanyp/ncatbot:latest
    stdin_open: true
    tty: true
    container_name: ncatbot
    ports:
      - "6099:6099"   # NapCat WebUI
      - "3001:3001"   # NapCat WebSocket
    volumes:
      - ./data/config.yaml:/root/ncatbot/config.yaml     # 配置文件
      - ./data/plugins:/root/ncatbot/plugins              # 插件目录
      - ./data/logs:/root/ncatbot/logs                    # 日志目录
      - ./data/QQ:/root/.config/QQ                     # NapCat 登录态持久化（重启后无需重新扫码）
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
